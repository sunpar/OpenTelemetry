events {
  worker_connections 1024;
}

http {
  upstream auth_api {
    server auth-api:8000;
  }

  upstream otel_collector {
    server otel-collector:4318;
  }

  # Trust source-IP forwarding only from private/internal proxy ranges.
  # Without a trusted proxy, $remote_addr remains the direct socket peer.
  set_real_ip_from 127.0.0.1;
  set_real_ip_from 10.0.0.0/8;
  set_real_ip_from 172.16.0.0/12;
  set_real_ip_from 192.168.0.0/16;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  server {
    listen 8088;

    location = /healthz {
      return 200 "ok\n";
    }

    location ~ ^/v1/(logs|traces|metrics)$ {
      auth_request /_auth;
      auth_request_set $telemetry_user $upstream_http_x_telemetry_user;
      auth_request_set $telemetry_user_id $upstream_http_x_telemetry_user_id;
      auth_request_set $telemetry_team $upstream_http_x_telemetry_team;
      auth_request_set $telemetry_token_id $upstream_http_x_telemetry_token_id;
      auth_request_set $telemetry_capture_profile $upstream_http_x_telemetry_capture_profile;

      # Overwrite any spoofed client identity headers with auth-api values.
      proxy_set_header X-Telemetry-User $telemetry_user;
      proxy_set_header X-Telemetry-User-Id $telemetry_user_id;
      proxy_set_header X-Telemetry-Team $telemetry_team;
      proxy_set_header X-Telemetry-Token-Id $telemetry_token_id;
      proxy_set_header X-Telemetry-Capture-Profile $telemetry_capture_profile;
      proxy_set_header X-Telemetry-Source-Ip $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;

      proxy_pass http://otel_collector;
    }

    location = /_auth {
      internal;
      proxy_pass http://auth_api/auth/verify;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-Original-URI $request_uri;
      proxy_set_header X-Telemetry-Source-Ip $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      return 404;
    }
  }
}
