events {
  worker_connections 1024;
}

http {
  upstream auth_api {
    server auth-api:8000;
  }

  upstream otel_collector {
    server otel-collector:4318;
  }

  server {
    listen 8088;

    location = /healthz {
      return 200 "ok\n";
    }

    location ~ ^/v1/(logs|traces|metrics)$ {
      client_max_body_size 32m;

      auth_request /_auth;
      auth_request_set $telemetry_user $upstream_http_x_telemetry_user;
      auth_request_set $telemetry_user_id $upstream_http_x_telemetry_user_id;
      auth_request_set $telemetry_team $upstream_http_x_telemetry_team;
      auth_request_set $telemetry_token_id $upstream_http_x_telemetry_token_id;
      auth_request_set $telemetry_capture_profile $upstream_http_x_telemetry_capture_profile;

      proxy_pass_request_headers off;

      # Re-add only OTLP transport headers and trusted auth-api metadata.
      proxy_set_header Host $proxy_host;
      proxy_set_header Content-Type $content_type;
      proxy_set_header Content-Encoding $http_content_encoding;
      proxy_set_header Accept $http_accept;
      proxy_set_header User-Agent $http_user_agent;
      proxy_set_header X-Telemetry-User $telemetry_user;
      proxy_set_header X-Telemetry-User-Id $telemetry_user_id;
      proxy_set_header X-Telemetry-Team $telemetry_team;
      proxy_set_header X-Telemetry-Token-Id $telemetry_token_id;
      proxy_set_header X-Telemetry-Capture-Profile $telemetry_capture_profile;
      proxy_set_header X-Telemetry-Source-Ip $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;

      proxy_pass http://otel_collector;
    }

    location = /_auth {
      internal;
      proxy_pass http://auth_api/auth/verify;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header X-Original-Content-Length $http_content_length;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-Original-URI $request_uri;
      proxy_set_header X-Original-Method $request_method;
      proxy_set_header X-Original-Content-Length $content_length;
      proxy_set_header X-Telemetry-Source-Ip $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      return 404;
    }
  }
}
