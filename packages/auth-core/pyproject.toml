[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-otel-auth-core"
version = "0.1.0"
description = "Shared auth storage and token primitives for the agent OpenTelemetry trial"
requires-python = ">=3.11"
dependencies = []

[tool.setuptools]
packages = ["agent_otel_auth_core"]
package-dir = {"" = "src"}

[tool.setuptools.package-data]
agent_otel_auth_core = ["migrations/*.sql"]
