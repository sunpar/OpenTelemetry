name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest -q

  static-validation:
    name: Static Validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Check docs, JSON, and shell syntax
        run: python scripts/check-docs.py

      - name: Check git whitespace
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            git diff --check "origin/${GITHUB_BASE_REF}...HEAD"
          elif [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
            git diff-tree --check --no-commit-id --root -r "$GITHUB_SHA"
          else
            git diff --check "${{ github.event.before }}" "$GITHUB_SHA"
          fi

  compose-validation:
    name: Compose Validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate gateway compose
        run: docker compose -f compose/docker-compose.gateway.yml config

      - name: Validate SigNoz wrapper compose
        run: docker compose -f compose/docker-compose.signoz.yml config

      - name: Validate SigNoz upstream override compose
        run: bash scripts/check-signoz-compose-config.sh
